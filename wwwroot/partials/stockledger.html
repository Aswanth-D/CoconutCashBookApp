<h2 class="section-title">Stock Status Balance Summary</h2>
<div class="kpis" id="stock-kpis" style="margin-bottom: 26px;"></div>

<!-- UNIFIED BATCH ENTRY FORM -->
<h2 class="section-title">Log Coconut Processing Batch</h2>
<div class="entry-form" style="margin-bottom: 22px;">
    <div class="form-grid">
        <div class="field">
            <label>Date *</label>
            <input type="date" id="stk-date" required>
        </div>
        <div class="field">
            <label>Raw Coconuts Used (Reduction) *</label>
            <input type="number" id="stk-input-coconuts" placeholder="e.g. 3300" required>
        </div>
        <div class="field">
            <label>Copra Produced (KG Addition)</label>
            <input type="number" id="stk-out-copra" placeholder="e.g. 300">
        </div>
        <div class="field">
            <label>Husk/Shell Produced (Units Addition)</label>
            <input type="number" id="stk-out-husk" placeholder="e.g. 3300">
        </div>
        <div class="field full">
            <label>Batch Description / Notes</label>
            <input type="text" id="stk-desc" placeholder="e.g. Lot 4 drying processing run">
        </div>
    </div>
    <div class="form-actions">
        <button type="button" class="btn" onclick="saveProcessingBatch()">Log Production Batch</button>
    </div>
</div>

<h2 class="section-title">Stock Movement Log</h2>
<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Category Item</th>
                <th>Movement Type</th>
                <th style="text-align:right;">Quantity</th>
                <th style="text-align:right;">Avg Rate</th>
                <th>Associated Party / Notes</th>
            </tr>
        </thead>
        <tbody id="inventory-body"></tbody>
    </table>
</div>
