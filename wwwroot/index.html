<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coconut Cash Book</title>
    <!-- Include the Supabase JS library from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --paper: #F6F3E7;
            --paper-dark: #EFEAD8;
            --husk: #5B3A20;
            --husk-dark: #3E2712;
            --palm: #2E5233;
            --palm-dark: #1D3921;
            --rust: #8A3A26;
            --rust-dark: #5E2717;
            --copra: #C9A15F;
            --ink: #2B2419;
            --ink-soft: #6B5F4D;
            --line: #D9D0B8;
            --card: #FFFDF6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, 'Times New Roman', serif;
            background: var(--paper);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 920px;
            margin: 0 auto;
            padding: 0 0 60px;
        }

        /* Header */
        header {
            background: var(--husk);
            color: #F6F3E7;
            padding: calc(22px + env(safe-area-inset-top, 0px)) 24px 0;
            position: relative;
        }

            header h1 {
                margin: 0 0 4px;
                font-size: 26px;
                font-weight: normal;
                letter-spacing: 0.3px;
            }

            header p {
                margin: 0 0 18px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                font-size: 12.5px;
                color: #D8C9B3;
            }

        /* Tab navigation styled as ledger binder tabs */
        nav {
            display: flex;
            gap: 6px;
            padding-left: 2px;
            flex-wrap: wrap;
        }

            nav button {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                font-size: 13.5px;
                font-weight: 600;
                letter-spacing: 0.2px;
                padding: 10px 18px 12px;
                border: none;
                background: var(--husk-dark);
                color: #C9BBA5;
                cursor: pointer;
                border-radius: 8px 8px 0 0;
                position: relative;
                top: 1px;
            }

                nav button.active {
                    background: var(--paper);
                    color: var(--husk-dark);
                }

        main {
            background: var(--paper);
            padding: 24px;
            min-height: 400px;
        }

        .view {
            display: none;
        }

            .view.active {
                display: block;
            }

        .ui {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* KPI cards */
        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .kpi {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 14px 16px;
        }

            .kpi .label {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--ink-soft);
                margin-bottom: 6px;
            }

            .kpi .value {
                font-size: 22px;
                color: var(--husk-dark);
            }

            .kpi.in .value {
                color: var(--palm-dark);
            }

            .kpi.out .value {
                color: var(--rust-dark);
            }

            .kpi.balance {
                border-color: var(--husk);
                border-width: 1.5px;
            }

        h2.section-title {
            font-size: 16px;
            font-weight: normal;
            color: var(--husk-dark);
            margin: 0 0 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--copra);
            display: inline-block;
        }

        .recent-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

            .recent-list li {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 0;
                border-bottom: 1px solid var(--line);
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                font-size: 13.5px;
            }

                .recent-list li:last-child {
                    border-bottom: none;
                }

            .recent-list .desc {
                color: var(--ink);
            }

            .recent-list .meta {
                color: var(--ink-soft);
                font-size: 11.5px;
            }

            .recent-list .amt.in {
                color: var(--palm-dark);
                font-weight: 600;
            }

            .recent-list .amt.out {
                color: var(--rust-dark);
                font-weight: 600;
            }

        .empty-note {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--ink-soft);
            font-size: 13px;
            padding: 20px 0;
            text-align: center;
        }

        /* Entry form */
        .entry-form {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 22px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

            .form-grid .full {
                grid-column: 1/-1;
            }

        .field label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--ink-soft);
            margin-bottom: 4px;
        }

        .field input, .field select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--ink);
        }

            .field input:focus, .field select:focus {
                outline: none;
                border-color: var(--husk);
            }

        .type-toggle {
            display: flex;
            gap: 8px;
        }

            .type-toggle button {
                flex: 1;
                padding: 9px;
                border: 1px solid var(--line);
                border-radius: 6px;
                background: #fff;
                cursor: pointer;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                font-size: 13px;
                font-weight: 600;
                color: var(--ink-soft);
            }

                .type-toggle button.sel-in.selected {
                    background: var(--palm);
                    color: #fff;
                    border-color: var(--palm-dark);
                }

                .type-toggle button.sel-out.selected {
                    background: var(--rust);
                    color: #fff;
                    border-color: var(--rust-dark);
                }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 14px;
        }

        .btn {
            padding: 9px 18px;
            border-radius: 6px;
            border: 1px solid var(--husk);
            background: var(--husk);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
        }

            .btn.secondary {
                background: transparent;
                color: var(--husk);
            }

            .btn:active {
                transform: scale(0.98);
            }

        /* Ledger table */
        .table-wrap {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow-x: auto; /* Enables horizontal scroll on small screens */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
            width: 100%;
        }

        table {
            width: 100%;
            min-width: 600px; /* Forces the table to maintain width so it scrolls instead of squishing */
            border-collapse: collapse;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
        }

        thead th {
            background: var(--husk-dark);
            color: #EFE7D6;
            text-align: left;
            padding: 10px 12px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        tbody td {
            padding: 9px 12px;
            border-bottom: 1px solid var(--line);
            color: var(--ink);
        }

        tbody tr:nth-child(even) {
            background: var(--paper-dark);
        }

        tbody tr:hover {
            background: #F0E9D5;
        }

        td.num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        td.in {
            color: var(--palm-dark);
        }

        td.out {
            color: var(--rust-dark);
        }

        td.bal {
            font-weight: 700;
            color: var(--husk-dark);
        }

            td.bal.negative {
                color: var(--rust-dark);
            }

        .cat-tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            background: var(--paper-dark);
            color: var(--ink-soft);
        }

        .status-badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            text-align: center;
        }

            .status-badge.paid {
                background: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }

            .status-badge.pending {
                background: #fcd1d1;
                color: #a94442;
                border: 1px solid #f5c6cb;
            }

        tbody tr.pending-row {
            background: #fff8f8;
        }

            tbody tr.pending-row:nth-child(even) {
                background: #fdf2f2;
            }

        .row-actions {
            white-space: nowrap;
        }

            .row-actions button {
                border: none;
                background: none;
                cursor: pointer;
                font-size: 12px;
                color: var(--ink-soft);
                margin-right: 6px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            }

                .row-actions button:hover {
                    color: var(--husk-dark);
                    text-decoration: underline;
                }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 8px;
        }

        @media (max-width:640px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .summary-grid table td:first-child, .summary-grid table th:first-child {
            padding-left: 14px;
        }

        .total-row td {
            font-weight: 700;
            border-top: 2px solid var(--husk);
            background: var(--paper-dark);
        }

        .opening-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13.5px;
            color: var(--ink-soft);
        }

            .opening-row input {
                width: 130px;
                padding: 6px 9px;
                border: 1px solid var(--line);
                border-radius: 6px;
                font-size: 13.5px;
            }

            .opening-row button {
                padding: 6px 12px;
                border-radius: 6px;
                border: 1px solid var(--husk);
                background: transparent;
                color: var(--husk);
                cursor: pointer;
                font-size: 12.5px;
            }

        .save-note {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 11.5px;
            color: var(--ink-soft);
            text-align: center;
            margin-top: 16px;
        }

        .filter-toggle button, .date-filter-toggle button {
            flex: 1;
            padding: 9px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-soft);
        }

            .filter-toggle button.selected, .date-filter-toggle button.selected {
                background: var(--husk);
                color: #fff;
                border-color: var(--husk-dark);
            }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>Coconut Cash Book</h1>
            <p>Track cash and stock levels dynamically — saved automatically</p>
            <nav>
                <button class="tab-btn active" data-view="dashboard">Dashboard</button>
                <button class="tab-btn" data-view="cashbook">Cash Book</button>
                <button class="tab-btn" data-view="inventory">Stock Ledger</button>
                <button class="tab-btn" data-view="traders">Traders</button>
                <button class="tab-btn" data-view="labor">Labor</button>
                <button class="tab-btn" data-view="summary">Summary</button>
            </nav>
        </header>

        <main>
            <!-- DASHBOARD -->
            <div class="view active" id="view-dashboard" data-partial="./partials/dashboard.html"></div>

            <!-- INVENTORY / STOCK LEDGER -->
            <div class="view" id="view-inventory" data-partial="./partials/inventory.html"></div>

            <!-- TRADERS -->
            <div class="view" id="view-traders" data-partial="./partials/traders.html"></div>

            <!-- LABOR -->
            <div class="view" id="view-labor" data-partial="./partials/labor.html"></div>

            <!-- CASH BOOK -->
            <div class="view" id="view-cashbook" data-partial="./partials/cashbook.html"></div>

            <!-- SUMMARY -->
            <div class="view" id="view-summary" data-partial="./partials/summary.html"></div>

            <p class="save-note" id="save-note">Connecting to cloud database...</p>
        </main>
    </div>

    <!-- Custom Elegant Modal Popup -->
    <div id="custom-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(43, 36, 25, 0.4); backdrop-filter: blur(2px); z-index: 10000; align-items: center; justify-content: center;">
        <div style="background: #FFFDF6; border: 2px solid #5B3A20; border-radius: 12px; width: 90%; max-width: 400px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-align: center;">
            <h3 id="modal-title" style="margin: 0 0 10px; font-family: Georgia, serif; color: #3E2712; font-size: 18px; font-weight: normal;">Notice</h3>
            <p id="modal-msg" style="margin: 0 0 20px; color: #2B2419; font-size: 14px; line-height: 1.5;"></p>
            <div style="display: flex; justify-content: center; gap: 12px;">
                <button id="modal-cancel-btn" class="btn secondary" style="padding: 8px 16px; font-size: 13px; display: none;">Cancel</button>
                <button id="modal-ok-btn" class="btn" style="padding: 8px 20px; font-size: 13px;">OK</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script type="module" src="js/partials-loader.js"></script>
    </body>
</html>
