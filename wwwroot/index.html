<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coconut Cash Book</title>
    <!-- Include the Supabase JS library from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">

    <!-- Vector Favicon Configuration (Web Page Tab Only) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%235B3A20' d='M256 32C132.3 32 32 132.3 32 256s100.3 224 224 224 224-100.3 224-224S379.7 32 256 32zm0 400c-97.2 0-176-78.8-176-176S158.8 80 256 80s176 78.8 176 176-78.8 176-176 176z'/%3E%3Cpath fill='%23f4f1ea' d='M256 80c-97.2 0-176 78.8-176 176s78.8 176 176 176 176-78.8 176-176S353.2 80 256 80zm20 110c0 11-9 20-20 20s-20-9-20-20 9-20 20-20 20 9 20 20zm-60 80c0 11-9 20-20 20s-20-9-20-20 9-20 20-20 20 9 20 20zm80 40c0 11-9 20-20 20s-20-9-20-20 9-20 20-20 20 9 20 20z'/%3E%3Ccircle cx='216' cy='190' r='14' fill='%235B3A20'/%3E%3Ccircle cx='176' cy='270' r='14' fill='%235B3A20'/%3E%3Ccircle cx='256' cy='310' r='14' fill='%235B3A20'/%3E%3C/svg%3E">
</head>
<body>
    <!-- Modern Mobile Sticky Bottom Navigation Menu (Kite Style with Icons) -->
    <div class="mobile-bottom-nav" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; border-top: 1px solid #f1f5f9; z-index: 999; padding: 8px 12px 22px 12px; box-sizing: border-box; box-shadow: 0 -4px 12px rgba(15, 23, 42, 0.03);">
        <div class="mobile-quick-tabs" style="display: flex; flex-grow: 1; align-items: center; justify-content: space-between;">
            <!-- Dash Tab -->
            <button class="tab-btn active" data-view="dashboard">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="9"></rect>
                    <rect x="14" y="3" width="7" height="5"></rect>
                    <rect x="14" y="12" width="7" height="9"></rect>
                    <rect x="3" y="16" width="7" height="5"></rect>
                </svg>
                <span class="nav-label">Dash</span>
            </button>

            <!-- Cash Tab -->
            <button class="tab-btn" data-view="cashbook">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"></line>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                <span class="nav-label">Cash</span>
            </button>

            <!-- Ledger Tab -->
            <button class="tab-btn" data-view="inventory">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span class="nav-label">Ledger</span>
            </button>

            <!-- More Tab Toggle -->
            <button id="menuToggleBtn" class="tab-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                <span class="nav-label">More</span>
            </button>
        </div>
    </div>

    <!-- Main Navigation Sidebar Drawer Container -->
    <header style="padding: 20px 16px;">
        <div class="brand-container" style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
            <!-- Clean Header layout without rendering internal image bugs -->
            <h1 style="margin: 0; font-size: 20px; font-weight: 700; color: #ffffff; line-height: 1.2; letter-spacing: 0.5px;">
                Coconut <br>Cash Book
            </h1>
        </div>

        <nav>
            <button class="tab-btn active desk-only" data-view="dashboard">Dashboard</button>
            <button class="tab-btn desk-only" data-view="cashbook">Cash Book</button>
            <button class="tab-btn desk-only" data-view="inventory">Stock Ledger</button>

            <button class="tab-btn" data-view="traders">Traders</button>
            <button class="tab-btn" data-view="labor">Labor</button>
            <button class="tab-btn" data-view="summary">Summary</button>
        </nav>
    </header>

    <main>
        <!-- Views mapped to standard partial modules -->
        <div class="view active" id="view-dashboard" data-partial="./partials/dashboard.html"></div>
        <div class="view" id="view-inventory" data-partial="./partials/stockledger.html"></div>
        <div class="view" id="view-traders" data-partial="./partials/traders.html"></div>
        <div class="view" id="view-labor" data-partial="./partials/labor.html"></div>
        <div class="view" id="view-cashbook" data-partial="./partials/cashbook.html"></div>
        <div class="view" id="view-summary" data-partial="./partials/summary.html"></div>

        <p class="save-note" id="save-note">Connecting to cloud database...</p>
    </main>

    <!-- Custom Elegant Modal Popup -->
    <div id="custom-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(43, 36, 25, 0.4); backdrop-filter: blur(2px); z-index: 10000; align-items: center; justify-content: center;">
        <div style="background: #FFFDF6; border: 2px solid #5B3A20; border-radius: 12px; width: 90%; max-width: 400px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-align: center;">
            <h3 id="modal-title" style="margin: 0 0 10px; font-family: Georgia, serif; color: #3E2712; font-size: 18px; font-weight: normal;">Notice</h3>
            <p id="modal-msg" style="margin: 0 0 20px; color: #2B2419; font-size: 14px; line-height: 1.5;"></p>
            <div style="display: flex; justify-content: center; gap: 12px;">
                <button id="modal-cancel-btn" class="btn secondary" style="padding: 8px 16px; font-size: 13px; display: none;">Cancel</button>
                <button id="modal-ok-btn" class="btn" style="padding: 8px 20px; font-size: 13px;">OK</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script type="module" src="js/partials-loader.js"></script>
</body>
</html>
